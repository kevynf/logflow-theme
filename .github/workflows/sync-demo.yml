name: Sync and Deploy Demo

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync Demo Branch
        run: |
          git checkout demo
          git reset --hard origin/main
          
          # 针对 Demo 站点的子路径部署修改配置
          sed -i "s|base: '/'|base: '/logflow-theme'|g" astro.config.mjs
          sed -i "s|site: SITE_URL|site: 'https://kevynf.github.io'|g" astro.config.mjs
          
          git add .
          git commit -m "Auto sync demo from main: $(date +'%Y-%m-%d %H:%M:%S')" || exit 0
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" demo --force

      - name: Install dependencies
        run: npm install

      - name: Build Astro
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
